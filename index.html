<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 50px;
        }
        form {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        input {
            margin: 10px;
            padding: 8px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h2>Student Details Form</h2>

<form onsubmit="return displayData()">
    <input type="text" id="name" placeholder="Enter Name" required><br>
    <input type="number" id="marks" placeholder="Enter Marks" required><br>
    <input type="text" id="regno" placeholder="Enter Register Number" required><br>
    
    <button type="submit">Submit</button>
</form>

<h3 id="output"></h3>

<script>
function displayData() {
    let name = document.getElementById("name").value;
    let marks = document.getElementById("marks").value;
    let regno = document.getElementById("regno").value;

    document.getElementById("output").innerHTML =
        "Name: " + name + "<br>" +
        "Marks: " + marks + "<br>" +
        "Register No: " + regno;

    return false; // prevent page reload
}
</script>

</body>
</html>
